name: Build and Deploy Tetris to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
        # Build BRICHT AB, wenn Linting fehlschlägt. Dies erzwingt Code-Qualität.
        run: npm run lint

      - name: Build Project
        # Führt den Build aus (z.B. Vite, Webpack). Erzeugt meist ein 'dist' Verzeichnis.
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Pfad zum Build-Output (Standard für Vite/Create-React-App ist 'dist')
          # Falls dein Build-Pfad anders ist (z.B. 'build' oder 'public'), passe dies an.
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4