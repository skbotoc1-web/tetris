<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Tetris</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0a0a14;color:#e0e0e0;
      font-family:'Segoe UI',system-ui,sans-serif;
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;min-height:100vh;padding:12px;
      user-select:none;-webkit-user-select:none}
    h1{font-size:1.8rem;letter-spacing:8px;text-transform:uppercase;
      color:#4caf50;text-shadow:0 0 20px rgba(76,175,80,.5);margin-bottom:12px}

    .wrap{display:flex;gap:14px;align-items:flex-start}

    /* Canvas */
    #tetris-canvas{display:block;cursor:default}

    /* Side panel */
    .panel{display:flex;flex-direction:column;gap:10px;width:140px}

    .box{background:#111122;border:1px solid #1e1e3a;border-radius:8px;padding:10px 12px}
    .box small{display:block;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;
      color:#444;margin-bottom:2px}
    .box .v{font-size:1.5rem;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}

    #next-canvas{background:#0a0a14;border-radius:4px;display:block;margin:0 auto}

    .combo-wrap{height:20px;text-align:center}
    #combo{font-size:.8rem;font-weight:700;color:#ff9800;
      opacity:0;transition:opacity .15s;letter-spacing:1px}

    select{width:100%;padding:7px 8px;background:#111122;color:#ddd;
      border:1px solid #1e1e3a;border-radius:6px;font-size:.85rem}
    select:disabled{opacity:.4}

    .btns{display:flex;flex-direction:column;gap:7px}
    button{padding:9px;border:none;border-radius:6px;font-size:.82rem;
      font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:1px;
      transition:filter .15s,transform .1s}
    button:hover:not(:disabled){filter:brightness(1.2)}
    button:active:not(:disabled){transform:translateY(1px)}
    button:disabled{opacity:.35;cursor:default}
    #btn-start  {background:#4caf50;color:#000}
    #btn-pause  {background:#ff9800;color:#000}
    #btn-restart{background:#f44336;color:#fff}
    #btn-mute   {background:#1e1e3a;color:#888;border:1px solid #2a2a4a;font-size:1rem}

    .keys{font-size:.72rem;color:#333;line-height:1.9}
    .keys kbd{background:#111122;border:1px solid #222244;border-radius:3px;
      padding:1px 4px;color:#666;font-size:.68rem}

    /* ── Responsive ── */
    @media(max-width:480px){
      h1{font-size:1.2rem;letter-spacing:4px;margin-bottom:8px}
      .wrap{flex-direction:column;align-items:center}
      .panel{flex-direction:row;flex-wrap:wrap;width:100%;gap:8px}
      .box{flex:1 1 calc(50% - 4px)}
      .btns{flex-direction:row;flex-wrap:wrap}
      .btns button{flex:1 1 calc(50% - 4px)}
      .keys{display:none}
    }
  </style>
</head>
<body>
  <h1>TETRIS</h1>
  <div class="wrap">
    <canvas id="tetris-canvas"></canvas>

    <div class="panel">
      <div class="box"><small>Score</small><div class="v" id="score">0</div></div>
      <div class="box"><small>Best</small><div class="v" id="best">0</div></div>
      <div class="box"><small>Level</small><div class="v" id="level">1</div></div>
      <div class="box"><small>Lines</small><div class="v" id="lines">0</div></div>

      <div class="box">
        <small>Next</small>
        <canvas id="next-canvas" width="100" height="76"></canvas>
      </div>

      <div class="combo-wrap"><span id="combo"></span></div>

      <div class="box">
        <small>Start Level</small>
        <select id="level-select"></select>
      </div>

      <div class="btns">
        <button id="btn-start">Start</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-restart">Restart</button>
        <button id="btn-mute">🔊</button>
      </div>

      <div class="box keys">
        <div><kbd>← →</kbd> Move</div>
        <div><kbd>↑</kbd> / <kbd>Z</kbd> Rotate</div>
        <div><kbd>↓</kbd> Soft drop</div>
        <div><kbd>Space</kbd> Hard drop</div>
        <div><kbd>P</kbd> Pause &nbsp;<kbd>M</kbd> Mute</div>
      </div>
    </div>
  </div>

  <script src="tetris.js"></script>
</body>
</html>
