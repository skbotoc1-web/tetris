<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Tetris 2026</title>
  <style>
    :root {
      --bg: #050510;
      --bg2: #0d1026;
      --surface: rgba(14, 18, 44, 0.8);
      --surface-2: rgba(20, 25, 56, 0.92);
      --border: #2b3475;
      --text: #e8ebff;
      --muted: #95a0d8;
      --accent: #4dffae;
      --warn: #ffcb53;
      --danger: #ff6f7a;
      --radius: 14px;
      --glow: 0 0 28px rgba(77, 255, 174, 0.35);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 10% 0%, rgba(77,255,174,.16), transparent 33%),
        radial-gradient(circle at 80% 15%, rgba(92,123,255,.2), transparent 35%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    .app {
      max-width: 1040px;
      margin: 0 auto;
      padding: 14px 12px 24px;
    }

    .brand {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 12px;
      margin: 4px 0 14px;
    }
    .brand h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      text-shadow: var(--glow);
    }
    .brand .tag {
      font-size: .72rem;
      letter-spacing: .16em;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      text-transform: uppercase;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 420px) minmax(260px, 1fr);
      gap: 14px;
      align-items: start;
    }

    .left, .right {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
    }

    .left { padding: 10px; }
    .canvas-shell {
      border-radius: 10px;
      overflow: hidden;
      background: #050711;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 14px 30px rgba(0,0,0,.45);
    }
    #tetris-canvas { display: block; width: 100%; height: auto; }

    .right {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }
    .box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 10px;
    }
    .box small {
      color: var(--muted);
      letter-spacing: .12em;
      font-size: .62rem;
      text-transform: uppercase;
      display: block;
      margin-bottom: 3px;
    }
    .val {
      font-weight: 800;
      font-size: 1.35rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .progress-row {
      grid-column: 1 / -1;
    }
    .progress-track {
      height: 10px;
      border-radius: 999px;
      background: #1e244f;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #4dffae, #7cf4ff);
      transition: width .25s ease;
    }
    .progress-text {
      margin-top: 3px;
      font-size: .72rem;
      color: var(--muted);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .next-hold {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .mini-canvas {
      display: block;
      margin: 6px auto 0;
      background: #070a18;
      border-radius: 7px;
      width: 100px;
      height: 76px;
    }

    .toasts {
      min-height: 20px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .toast {
      font-size: .74rem;
      letter-spacing: .08em;
      font-weight: 700;
      opacity: 0;
      transition: opacity .16s ease;
    }
    .toast.visible { opacity: 1; }
    #combo { color: var(--warn); }
    #levelup { color: var(--accent); }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    button, select {
      border-radius: 10px;
      border: 1px solid var(--border);
      color: var(--text);
      background: #151b44;
      font-weight: 700;
    }
    button {
      padding: 10px 10px;
      cursor: pointer;
      transition: transform .08s ease, filter .1s ease;
      text-transform: uppercase;
      letter-spacing: .07em;
      font-size: .74rem;
    }
    button:hover:not(:disabled) { filter: brightness(1.12); }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: .45; cursor: default; }

    #btn-start { background: linear-gradient(180deg, #50f8b0, #2bcf8c); color: #04150d; border-color: #32d594; }
    #btn-pause { background: linear-gradient(180deg, #ffd170, #f7b82f); color: #231600; border-color: #f0bc4a; }
    #btn-mute { background: #151b44; }

    select {
      width: 100%;
      padding: 8px 10px;
      font-size: .8rem;
      appearance: none;
    }

    .settings {
      display: grid;
      gap: 7px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: .8rem;
      color: var(--text);
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex: 0 0 auto;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: #434e8f;
      transition: .16s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      transition: .16s;
    }
    .toggle input:checked + .toggle-track {
      background: #44e7a1;
    }
    .toggle input:checked + .toggle-track::after {
      transform: translateX(16px);
    }

    .status {
      text-align: center;
      font-size: .72rem;
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .mobile-pad {
      display: none;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .mobile-pad button {
      padding: 12px 6px;
      font-size: .9rem;
      letter-spacing: 0;
      text-transform: none;
    }

    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
      .right { order: 2; }
      .left { order: 1; }
    }

    @media (max-width: 640px) {
      .app { padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
      .controls { grid-template-columns: 1fr 1fr; }
      #btn-mute { grid-column: 1 / -1; }
      .mobile-pad { display: grid; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="brand">
      <h1>Tetris</h1>
      <span class="tag">2026 Edition</span>
    </header>

    <section class="layout">
      <section class="left">
        <div class="canvas-shell">
          <canvas id="tetris-canvas"></canvas>
        </div>
        <div class="mobile-pad" aria-label="Touch controls">
          <button id="btn-left" type="button">←</button>
          <button id="btn-right" type="button">→</button>
          <button id="btn-rotate" type="button">↻</button>
          <button id="btn-hard" type="button">⤓</button>
          <button id="btn-down" type="button">↓</button>
          <button id="btn-hold" type="button">Hold</button>
        </div>
      </section>

      <section class="right">
        <div class="stat-grid">
          <div class="box"><small>Score</small><div class="val" id="score">0</div></div>
          <div class="box"><small>Best</small><div class="val" id="best">0</div></div>
          <div class="box"><small>Level</small><div class="val" id="level">1</div></div>
          <div class="box"><small>Lines</small><div class="val" id="lines">0</div></div>

          <div class="box progress-row">
            <small>Next level</small>
            <div class="progress-track"><div class="progress-fill" id="level-progress-bar"></div></div>
            <div class="progress-text" id="level-progress-text">0 / 10</div>
          </div>
        </div>

        <div class="next-hold">
          <div class="box">
            <small>Next</small>
            <canvas id="next-canvas" class="mini-canvas" width="100" height="76"></canvas>
          </div>
          <div class="box">
            <small>Hold (C)</small>
            <canvas id="hold-canvas" class="mini-canvas" width="100" height="76"></canvas>
          </div>
        </div>

        <div class="toasts">
          <span class="toast" id="combo"></span>
          <span class="toast" id="levelup"></span>
        </div>

        <div class="box">
          <small>Start level</small>
          <select id="level-select"></select>
        </div>

        <div class="controls">
          <button id="btn-start" type="button">Start</button>
          <button id="btn-pause" type="button" disabled>Pause</button>
          <button id="btn-mute" type="button">🔊</button>
        </div>

        <div class="settings">
          <small style="color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-size:.62rem;">Settings</small>
          <div class="setting-row"><span>Ghost piece</span><label class="toggle"><input id="set-ghost" type="checkbox" checked><span class="toggle-track"></span></label></div>
          <div class="setting-row"><span>Hold piece</span><label class="toggle"><input id="set-hold" type="checkbox" checked><span class="toggle-track"></span></label></div>
          <div class="setting-row"><span>Hard drop</span><label class="toggle"><input id="set-harddrop" type="checkbox" checked><span class="toggle-track"></span></label></div>
          <div class="setting-row"><span>Music</span><label class="toggle"><input id="set-music" type="checkbox" checked><span class="toggle-track"></span></label></div>
          <div class="setting-row"><span>SFX</span><label class="toggle"><input id="set-sfx" type="checkbox" checked><span class="toggle-track"></span></label></div>
          <div class="setting-row"><span>DAS speed</span>
            <select id="set-das" style="max-width:130px">
              <option value="slow">Slow</option>
              <option value="normal" selected>Normal</option>
              <option value="fast">Fast</option>
              <option value="instant">Instant</option>
            </select>
          </div>
        </div>

        <div class="status" id="state-label">Ready</div>
      </section>
    </section>
  </main>

  <script type="module" src="tetris.js"></script>
</body>
</html>
