<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Tetris</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #4caf50;
      text-shadow: 0 0 20px rgba(76,175,80,0.5);
      margin-bottom: 16px;
    }

    .game-wrap {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    canvas#tetris-canvas {
      display: block;
      border: 2px solid #222;
      box-shadow: 0 0 30px rgba(76,175,80,0.15);
      background: #0d0d1a;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 140px;
    }

    .box {
      background: #14142a;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 12px;
    }

    .box label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 4px;
    }

    .box .val {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
    }

    .next-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 80px;
    }

    canvas#next-canvas {
      background: #0d0d1a;
      border-radius: 4px;
    }

    .controls {
      font-size: 0.75rem;
      color: #444;
      line-height: 1.8;
    }
    .controls kbd {
      background: #1e1e3a;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 0.72rem;
      color: #aaa;
    }

    .btns { display: flex; flex-direction: column; gap: 8px; }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: filter 0.15s, transform 0.1s;
    }
    button:hover  { filter: brightness(1.15); }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.35; cursor: default; }

    #btn-start   { background: #4caf50; color: #000; }
    #btn-pause   { background: #ff9800; color: #000; }
    #btn-restart { background: #f44336; color: #fff; }
    #btn-mute    { background: #1e1e3a; color: #aaa; border: 1px solid #333; }

    select {
      width: 100%;
      padding: 8px;
      background: #1e1e3a;
      color: #fff;
      border: 1px solid #333;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    @media (max-width: 520px) {
      h1 { font-size: 1.4rem; }
      .game-wrap { flex-direction: column; align-items: center; }
      .panel { flex-direction: row; flex-wrap: wrap; min-width: unset; width: 100%; }
      .box { flex: 1 1 40%; }
      .controls { display: none; }
    }
  </style>
</head>
<body>
  <h1>Tetris</h1>
  <div class="game-wrap">
    <canvas id="tetris-canvas"></canvas>

    <div class="panel">
      <div class="box">
        <label>Score</label>
        <div class="val" id="score">0</div>
      </div>
      <div class="box">
        <label>Level</label>
        <div class="val" id="level">1</div>
      </div>
      <div class="box">
        <label>Lines</label>
        <div class="val" id="lines">0</div>
      </div>
      <div class="box">
        <label>Best</label>
        <div class="val" id="hiscore">0</div>
      </div>

      <div class="box">
        <label>Next</label>
        <div class="next-wrap">
          <canvas id="next-canvas" width="100" height="80"></canvas>
        </div>
      </div>

      <div class="box">
        <label>Start Level</label>
        <select id="level-select"></select>
      </div>

      <div class="btns">
        <button id="btn-start">Start</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-restart">Restart</button>
        <button id="btn-mute">🔊</button>
      </div>

      <div class="box controls">
        <label>Controls</label>
        <div><kbd>← →</kbd> Move</div>
        <div><kbd>↑</kbd> Rotate</div>
        <div><kbd>↓</kbd> Soft drop</div>
        <div><kbd>Space</kbd> Hard drop</div>
        <div><kbd>P</kbd> Pause &nbsp; <kbd>M</kbd> Mute</div>
      </div>
    </div>
  </div>

  <script src="tetris.js"></script>
</body>
</html>
